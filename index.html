<!doctype html>
<html lang="pl" xmlns:v-bind="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1" name="viewport">

    <title>rtCoder</title>

    <link href="font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css">
    <link href="less/style.css" rel="stylesheet" type="text/css"/>
</head>
<body>
<div class="container" id="app">
    <div class="info-container" v-if="userData">
        <div class="image">
            <img src="" :src="userData.avatar_url" alt="">
        </div>

        <div class="social">
            <div class="social-box">
                <a href="https://linkedin.com/in/dawid-je%C5%BC-927285a4" title="LinkedIn">
                    <i class="fa fa-linkedin"></i>
                </a>
            </div>
            <div class="social-box">
                <a href="https://codepen.io/rtCoder/" title="CodePen">
                    <i class="fa fa-codepen"></i>
                </a>
            </div>
            <div class="social-box">
                <a href="https://github.com/rtcoder" title="GitHub">
                    <i class="fa fa-github"></i>
                </a>
            </div>
            <div class="social-box">
                <a href="mailto:dawidjez@gmail.com" title="E-mail">
                    <i class="fa fa-at"></i>
                </a>
            </div>
        </div>
    </div>
    <div class="accordion">
        <div class="accordion-element">
            <div class="label" @click="e => e.target.classList.toggle('active')">Repositories</div>

            <div class="content">
                <div class="repo" v-for="repo of repos">
                    <div class="row">
                        <a target="_blank" v-bind:href="repo.html_url" v-bind:title="repo.name">{{repo.name}}</a>
                        <div class="additional">
                            <a class="gh-pages-link" target="_blank"
                               v-bind:href="repo.homepage ? repo.homepage : 'https://' + gitHubUername + '.github.io/' + repo.name"
                               v-if="repo.has_pages">Live preview</a>
                            <span class="stats" v-bind:class="{ disabled: !repo.stargazers_count }">
                            <i class="fa fa-star"></i> {{repo.stargazers_count}}</span>
                            <span class="stats" v-bind:class="{ disabled: !repo.forks_count }">
                            <i class="fa fa-code-fork"></i> {{repo.forks_count}}</span>
                            <span class="stats" v-bind:class="{ disabled: !repo.watchers_count }">
                            <i class="fa fa-eye"></i> {{repo.watchers_count}}</span>
                        </div>
                    </div>
                    <div class="row">
                        <div class="description" v-if="repo.description">{{repo.description}}</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="accordion-element">
            <div class="label" @click="e => e.target.classList.toggle('active')">Gists</div>

            <div class="content">
                <div class="repo" v-for="gist of gists">
                    <div class="row">
                        <div class="description" v-if="gist.description.length">
                            <a target="_blank" v-bind:href="gist.html_url">{{gist.description}}</a>
                        </div>
                        <div class="description" v-if="!gist.description.length">{{getFirstFilenameFromGist(gist)}}
                        </div>
                    </div>
                    <div class="row">
                        <p><b>Files:</b></p>
                        <p v-for="file of gist.files">
                            {{file.filename}}
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!--        <div class="username">{{userData.name}}</div>-->
    <!--        <div class="bio">{{userData.bio}}</div>-->
    <!--        <div class="location">{{userData.location}}</div>-->
    <!--        <div class="hire" v-if="userData.hireable">-->
    <!--            <i class="fa fa-check"></i> Available to hire-->
    <!--        </div>-->
</div>

<script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue-resource@1.3.4"></script>
<script src="js/app.js"></script>

</body>
</html>
